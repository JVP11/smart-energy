<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Facility - Smart Energy Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/style.css" />
    <script src="/static/theme.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div><h1>Edit Facility</h1></div>
      <div class="header-btns">
        <button type="button" id="themeToggle" onclick="themeToggle()" aria-label="Switch theme" title="Day / Night"></button>
        <a href="/platform" class="btn btn-secondary">← Back to Platform</a>
        <a href="/logout" class="btn btn-primary">Logout</a>
      </div>
    </header>
    <main class="app-main">
      <div class="card" style="max-width:28rem">
        <form method="post">
          <div class="field-row">
            <label>Facility Name</label>
            <input type="text" name="name" value="{{ facility.name }}" required />
          </div>
          <div class="field-row">
            <label>Type</label>
            <input type="text" name="type" value="{{ facility.type or 'Building' }}" placeholder="e.g. Building, Substation" />
          </div>
          <div class="field-row">
            <label>Zone</label>
            <input type="text" name="zone" value="{{ facility.zone or '' }}" placeholder="e.g. Zone A" />
          </div>
          <button type="submit">Save Changes</button>
        </form>
      </div>
    </main>
  </body>
</html>
