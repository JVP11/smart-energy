<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Kerala Power Infrastructure Map – Smart Energy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      #map { height: calc(100vh - 140px); min-height: 400px; width: 100%; }
      .map-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; padding: 0.75rem 1rem; background: #0f172a; color: #e2e8f0; }
      .map-header h1 { margin: 0; font-size: 1.25rem; }
      .map-legend { display: flex; gap: 1.5rem; flex-wrap: wrap; font-size: 0.85rem; }
      .map-legend span { display: inline-flex; align-items: center; gap: 0.35rem; }
      .map-legend .dot { width: 10px; height: 10px; border-radius: 50%; }
      .map-legend .line-sample { width: 20px; height: 3px; }
      .power-tower { background: #f59e0b; }
      .power-pole { background: #22c55e; }
      .power-substation { background: #ef4444; }
      .power-line { background: #3b82f6; }
      .map-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(15,23,42,0.95); color: #e2e8f0; padding: 1.5rem 2rem; border-radius: 8px; z-index: 1000; font-size: 0.95rem; }
      .map-container { position: relative; }
    </style>
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>⚡ Kerala Power Infrastructure Map</h1>
        <p>Electric posts, towers, substations &amp; transmission lines (OpenStreetMap data)</p>
      </div>
      <div class="header-btns">
        <a href="/platform" class="btn btn-outline">← Back to Platform</a>
        {% if user_id %}<a href="/logout" class="btn btn-primary">Logout</a>{% endif %}
      </div>
    </header>

    <div class="map-header">
      <h1>Where the electric posts and cables go</h1>
      <div class="map-legend">
        <span><span class="dot power-tower"></span> Towers</span>
        <span><span class="dot power-pole"></span> Poles</span>
        <span><span class="dot power-substation"></span> Substations</span>
        <span><span class="line-sample power-line"></span> Power lines</span>
      </div>
    </div>

    <div class="map-container">
      <div id="map"></div>
      <div id="mapLoading" class="map-loading">Loading power infrastructure from OpenStreetMap…</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
      // Kerala bounding box (south, west, north, east)
      const KERALA_BOUNDS = [[8.2, 74.9], [12.8, 77.3]];
      const KERALA_CENTER = [10.5, 76.2];

      const map = L.map('map').setView(KERALA_CENTER, 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
      }).addTo(map);

      // Fit Kerala
      map.fitBounds(KERALA_BOUNDS, { padding: [20, 20] });

      const towerIcon = L.divIcon({ className: 'power-marker', html: '<span style="width:8px;height:8px;border-radius:50%;background:#f59e0b;display:block;margin:-4px 0 0 -4px"></span>', iconSize: [8, 8] });
      const poleIcon = L.divIcon({ className: 'power-marker', html: '<span style="width:6px;height:6px;border-radius:50%;background:#22c55e;display:block;margin:-3px 0 0 -3px"></span>', iconSize: [6, 6] });
      const substationIcon = L.divIcon({ className: 'power-marker', html: '<span style="width:10px;height:10px;border-radius:2px;background:#ef4444;display:block;margin:-5px 0 0 -5px"></span>', iconSize: [10, 10] });

      const powerLineStyle = { color: '#3b82f6', weight: 2, opacity: 0.8 };

      function runOverpass(query) {
        return fetch('/api/overpass?q=' + encodeURIComponent(query))
          .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); });
      }

      function addNodes(data, type, icon, label) {
        if (!data.elements) return;
        data.elements.filter(e => e.lat && e.lon).forEach(e => {
          const name = e.tags?.name || e.tags?.operator || type;
          L.marker([e.lat, e.lon], { icon }).addTo(map)
            .bindPopup(`<b>${label}</b><br>${name}`);
        });
      }

      function addWays(data) {
        if (!data.elements) return;
        data.elements.forEach(e => {
          if (!e.geometry || e.geometry.length < 2) return;
          const latlngs = e.geometry.map(g => [g.lat, g.lon]);
          const voltage = e.tags?.voltage || '';
          const name = e.tags?.name || e.tags?.line || 'Power line';
          L.polyline(latlngs, powerLineStyle).addTo(map)
            .bindPopup(`<b>Power line</b><br>${name}${voltage ? '<br>' + voltage : ''}`);
        });
      }

      async function loadPowerData() {
        const [s, w, n, e] = [8.2, 74.9, 12.8, 77.3];
        const bbox = `(${s},${w},${n},${e})`;

        const nodesQuery = `[out:json][timeout:60];(node["power"="tower"]${bbox};node["power"="pole"]${bbox};node["power"="substation"]${bbox};);out body;`;
        const waysQuery = `[out:json][timeout:60];way["power"="line"]${bbox};out geom;`;

        try {
          const [nodesRes, waysRes] = await Promise.all([
            runOverpass(nodesQuery),
            runOverpass(waysQuery)
          ]);

          const nodes = nodesRes.elements || [];
          const ways = waysRes.elements || [];

          nodes.forEach(n => {
            const icon = n.tags?.power === 'substation' ? substationIcon
              : n.tags?.power === 'tower' ? towerIcon : poleIcon;
            const label = n.tags?.power === 'substation' ? 'Substation' : n.tags?.power === 'tower' ? 'Tower' : 'Pole';
            const name = n.tags?.name || n.tags?.operator || label;
            L.marker([n.lat, n.lon], { icon }).addTo(map).bindPopup(`<b>${label}</b><br>${name}`);
          });

          ways.forEach(w => {
            if (!w.geometry || w.geometry.length < 2) return;
            const latlngs = w.geometry.map(g => [g.lat, g.lon]);
            const voltage = w.tags?.voltage || '';
            const name = w.tags?.name || w.tags?.line || 'Power line';
            L.polyline(latlngs, powerLineStyle).addTo(map)
              .bindPopup(`<b>Power line</b><br>${name}${voltage ? '<br>' + voltage : ''}`);
          });

          document.getElementById('mapLoading').style.display = 'none';
        } catch (err) {
          document.getElementById('mapLoading').textContent = 'Could not load data. Try again or check connection.';
          console.error(err);
        }
      }

      loadPowerData();
    </script>
  </body>
</html>
