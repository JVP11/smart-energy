<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Tariff - Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/style.css" />
    <script src="/static/theme.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div><h1>Edit Tariff</h1></div>
      <div class="header-btns">
        <button type="button" id="themeToggle" onclick="themeToggle()" aria-label="Switch theme" title="Day / Night"></button>
        <a href="/admin/dashboard" class="btn btn-secondary">← Back</a>
        <a href="/logout" class="btn btn-primary">Logout</a>
      </div>
    </header>
    <main class="app-main">
      <div class="card" style="max-width:28rem">
        <form method="post">
          <div class="field-row">
            <label>Rate per kWh (₹)</label>
            <input type="number" name="rate_per_kwh" value="{{ tariff.rate_per_kwh }}" step="0.01" required />
          </div>
          <div class="field-row">
            <label>Effective Date</label>
            <input type="date" name="effective_date" value="{{ tariff.effective_date }}" required />
          </div>
          <button type="submit">Save Changes</button>
        </form>
      </div>
    </main>
  </body>
</html>
